name: Pinterest Search & Download (Zipped)

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'Search term for Pinterest'
        required: true
        type: string
        default: 'nature landscape'
      max_items:
        description: 'Number of images/videos to download'
        required: false
        type: number
        default: 10
      output_format:
        description: 'Media type to download'
        required: true
        type: choice
        default: 'both'
        options:
          - both
          - images
          - videos
      upload_method:
        description: 'Save method'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'
      release_tag:
        description: 'Release tag (if Releases method is chosen)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  pinterest-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: 📂 Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🔧 Install Dependencies
      run: |
        pip install pinterest-dl
        sudo apt-get update && sudo apt-get install -y ffmpeg zip

    - name: 🧠 Run Pinterest Search & Download
      id: download
      run: |
        python3 << 'EOF'
        import os
        from pathlib import Path
        from pinterest_dl import PinterestDL

        QUERY = os.environ.get('INPUT_QUERY')
        MAX_ITEMS = int(os.environ.get('INPUT_MAX_ITEMS', 10))
        OUTPUT_FORMAT = os.environ.get('INPUT_FORMAT', 'both')
        OUTPUT_DIR = "pinterest_results"

        Path(OUTPUT_DIR).mkdir(parents=True, exist_ok=True)

        image_count = 0
        video_count = 0

        if OUTPUT_FORMAT in ['both', 'images']:
            try:
                print(f"🔍 Searching Pinterest for images: '{QUERY}'")
                image_downloader = PinterestDL.with_api()
                images = image_downloader.search_and_download(
                    query=QUERY,
                    output_dir=OUTPUT_DIR,
                    num=MAX_ITEMS,
                    download_streams=False,
                )
                image_count = len(images) if images else 0
                print(f"✅ Downloaded {image_count} images")
            except Exception as e:
                print(f"⚠️ Error downloading images: {e}")

        if OUTPUT_FORMAT in ['both', 'videos']:
            try:
                print(f"🔍 Searching Pinterest for videos: '{QUERY}'")
                video_downloader = PinterestDL.with_api()
                videos = video_downloader.search_and_download(
                    query=QUERY,
                    output_dir=OUTPUT_DIR,
                    num=MAX_ITEMS,
                    download_streams=True,
                )
                video_count = len(videos) if videos else 0
                print(f"✅ Downloaded {video_count} videos")
            except Exception as e:
                print(f"⚠️ Error downloading videos: {e}")

        total_files = image_count + video_count
        print(f"🎯 Total files downloaded: {total_files}")

        # Save counts for later use
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"total_files={total_files}\n")
            f.write(f"image_count={image_count}\n")
            f.write(f"video_count={video_count}\n")
        EOF
      env:
        INPUT_QUERY: ${{ github.event.inputs.search_query }}
        INPUT_MAX_ITEMS: ${{ github.event.inputs.max_items }}
        INPUT_FORMAT: ${{ github.event.inputs.output_format }}

    - name: 📦 Zip & Split (if needed)
      run: |
        # Sanitize search query for filename
        SAFE_NAME=$(echo "${{ github.event.inputs.search_query }}" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c1-50)
        TOTAL_FILES="${{ steps.download.outputs.total_files }}"
        ZIP_NAME="${SAFE_NAME}_${TOTAL_FILES}.zip"

        echo "Creating zip archive: $ZIP_NAME"
        cd pinterest_results
        zip -r "../$ZIP_NAME" .

        cd ..
        THRESH_MB=90
        FILESIZE=$(stat -c%s "$ZIP_NAME" 2>/dev/null || echo 0)
        THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

        mkdir -p release_files

        if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
          echo "🔪 Zip file is larger than 90MB, splitting into ${THRESH_MB}MB parts..."
          BASE="${ZIP_NAME%.zip}"
          zip -r -s "${THRESH_MB}m" "${BASE}.zip" "pinterest_results"  # re-zip with split
          # The split command creates files like ${BASE}.z01, .z02, .zip
          mv "${BASE}.z"* release_files/ 2>/dev/null || true
          rm -f "$ZIP_NAME"
          echo "Split parts moved to release_files/"
        else
          mv "$ZIP_NAME" release_files/
          echo "Moved single zip file to release_files/"
        fi

        # Also move any leftover individual files? Not needed because we zipped everything.
        echo "Contents of release_files:"
        ls -la release_files/

    - name: 📅 Get Current Date
      id: get_date
      run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

    - name: 📤 Push to Repository
      if: github.event.inputs.upload_method == 'repository (push to repo)'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p downloads
        mv release_files/* downloads/
        echo "Contents of downloads folder:"
        ls -la downloads/
        git add downloads/
        git commit -m "Pinterest: ${{ github.event.inputs.search_query }} (${{ steps.download.outputs.total_files }} items) [skip ci]" || echo "Nothing to commit"
        git push

    - name: 📤 Upload to GitHub Releases
      if: github.event.inputs.upload_method == 'release (GitHub Releases)'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('pinterest-{0}', github.run_number) }}
        name: ${{ format('Pinterest - {0}', github.event.inputs.search_query) }}
        body: |
          **Pinterest Search Results**

          **Query:** ${{ github.event.inputs.search_query }}
          **Max items:** ${{ github.event.inputs.max_items }}
          **Type:** ${{ github.event.inputs.output_format }}
          **Total files:** ${{ steps.download.outputs.total_files }} (images: ${{ steps.download.outputs.image_count }}, videos: ${{ steps.download.outputs.video_count }})
          **Date:** ${{ steps.get_date.outputs.date }}

          **Download:** The zip archive (or split parts) is attached below.
        files: release_files/*
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: false

    - name: 🧹 Cleanup
      if: always()
      run: rm -rf release_files pinterest_results *.zip 2>/dev/null || true
