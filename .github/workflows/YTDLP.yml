name: YouTube Downloader Pro

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string

      output_format:
        description: 'Output format'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'

      desired_quality:
        description: 'Video: 720p, 1080p | Audio: 192kbps, 320kbps'
        required: false
        type: string
        default: '720p'

      max_part_mb:
        description: 'Max size per part (MB) - 0 = auto 1800 MB'
        required: false
        type: string
        default: '90'

      upload_method:
        description: '📤 Final storage method'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'

      release_tag:
        description: '🏷️ Release tag name (if Release method is chosen)'
        required: false
        type: string
        default: ''

      # ---------- NEW FEATURE: Subtitle Options ----------
      download_subtitles:
        description: 'Download English subtitles?'
        required: false
        type: choice
        options:
          - 'no'
          - 'yes, as .srt file'
        default: 'no'

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip
          # ---------- NEW: Install subtitle library ----------
          pip3 install --quiet requests youtube_transcript_api

      - name: 🔗 Get Download Link
        id: retrieve
        run: |
          python3 << 'EOF'
          import os, sys, time, re, requests
          # ---------- NEW: For subtitles ----------
          from youtube_transcript_api import YouTubeTranscriptApi
          from youtube_transcript_api.formatters import SRTFormatter

          URL  = os.environ.get('INPUT_URL')
          FMT  = os.environ.get('INPUT_FORMAT')
          QUAL = os.environ.get('INPUT_QUALITY')
          GET_SUB = os.environ.get('INPUT_SUBTITLES') == 'yes, as .srt file'

          # Extract video ID from URL
          vid_match = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', URL)
          if not vid_match:
              print("::error::Could not extract video ID from URL")
              sys.exit(1)
          video_id = vid_match[1]

          is_audio = FMT == 'mp3'
          if is_audio:
              QUAL = QUAL if QUAL in ('64kbps','128kbps','192kbps','320kbps') else '192kbps'
          else:
              QUAL = QUAL if QUAL in ('720p','1080p') else '720p'

          # ---------- NEW: Subtitle download logic ----------
          subtitle_saved = False
          if GET_SUB:
              try:
                  transcript_list = YouTubeTranscriptApi.list_transcripts(video_id)
                  # Try to find a manually created English transcript first
                  transcript = transcript_list.find_transcript(['en'])
                  # Or use auto-generated if manual isn't available
                  # transcript = transcript_list.find_transcript(['en'])

                  srt_formatter = SRTFormatter()
                  srt_content = srt_formatter.format_transcript(transcript.fetch())

                  subtitle_filename = f"{video_id}_en.srt"
                  with open(subtitle_filename, 'w', encoding='utf-8') as sub_f:
                      sub_f.write(srt_content)
                  subtitle_saved = True
                  print(f"✅ English subtitles saved as {subtitle_filename}")
              except Exception as e:
                  print(f"⚠️ Could not download subtitles: {e}. Continuing without them.")

          # ---------- Original Video Download API Logic ----------
          payload = {
              "url": URL,
              "os": "linux",
              "output": {"type": "audio" if is_audio else "video", "format": FMT}
          }
          if is_audio:
              payload["audio"] = {"bitrate": QUAL}
          else:
              payload["output"]["quality"] = QUAL

          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"})
          s.get("https://media.ytmp3.gg/")

          resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
          resp.raise_for_status()
          data = resp.json()

          status_url = data.get('statusUrl')
          title = data.get('title', 'video')

          dl_url = None
          for _ in range(150):
              time.sleep(2)
              r = s.get(status_url, timeout=20)
              status = r.json()
              if status.get('status') == 'completed':
                  dl_url = status.get('downloadUrl')
                  break
              if status.get('status') == 'failed':
                  print("::error::Server failed to prepare the video")
                  sys.exit(1)

          if not dl_url:
              print("::error::Could not get download link")
              sys.exit(1)

          clean = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', title.replace(' ', '_'))
          clean = re.sub(r'_+', '_', clean).strip('_')[:70] or video_id
          clean = clean.lstrip('-')
          fname = f"{clean}_{video_id}_{QUAL}.{FMT}"

          # Write download info and subtitle flag
          with open(".download_info", "w", encoding="utf-8") as f:
              f.write(f"{dl_url}\n{fname}\n{title}\n")
              f.write(f"subtitle_saved={subtitle_saved}\n")
              if subtitle_saved:
                  f.write(f"subtitle_filename={subtitle_filename}\n")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"filename={fname}\n")
              f.write(f"title={title}\n")
              f.write(f"subtitle_saved={'true' if subtitle_saved else 'false'}\n")
          EOF
        env:
          INPUT_URL:         ${{ github.event.inputs.video_url }}
          INPUT_FORMAT:      ${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}
          INPUT_QUALITY:     ${{ github.event.inputs.desired_quality }}
          # ---------- NEW: Pass subtitle option ----------
          INPUT_SUBTITLES:   ${{ github.event.inputs.download_subtitles }}

      - name: 📥 Download File
        run: |
          DL_URL=$(head -1 .download_info)
          FILENAME=$(sed -n '2p' .download_info)
          mkdir -p release_files
          echo "Downloading: $FILENAME"
          curl -L --fail --progress-bar -o "release_files/$FILENAME" "$DL_URL"
          if [ ! -s "release_files/$FILENAME" ]; then
            echo "::error::Downloaded file is empty!"
            exit 1
          fi

      # ---------- NEW: Include Subtitles in Release ----------
      - name: 📝 Include Subtitles in Release
        if: steps.retrieve.outputs.subtitle_saved == 'true'
        run: |
          # Find subtitle file and move to release_files
          SUB_FILE=$(grep "subtitle_filename=" .download_info | cut -d'=' -f2)
          if [ -f "$SUB_FILE" ]; then
            mv "$SUB_FILE" release_files/
            echo "📝 Included subtitles: $SUB_FILE"
          else
            echo "⚠️ Subtitle file not found, skipping."
          fi

      - name: ✂️ Split Large File (if needed)
        run: |
          FILENAME="${{ steps.retrieve.outputs.filename }}"
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi
          FILESIZE=$(stat -c%s "release_files/$FILENAME" 2>/dev/null || echo 0)
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

          if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
            echo "🔪 Splitting into ${THRESH_MB}MB parts..."
            BASE="${FILENAME%.*}"
            cd release_files
            zip -r -s "${THRESH_MB}m" "${BASE}.zip" "./$FILENAME"
            rm -- "$FILENAME"
            cd ..
            echo "Parts created:"
            ls -lh release_files/
          else
            echo "📦 No split needed ($(( FILESIZE / 1024 / 1024 )) MB)"
          fi

      - name: 📅 Get Current Date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to Repository
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p downloads
          mv release_files/* downloads/
          git add downloads/
          git commit -m "⬇️ YouTube: ${{ steps.retrieve.outputs.filename }} [skip ci]" || echo "Nothing to commit"
          git push

      - name: 📤 Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: ${{ format('YouTube - {0}', steps.retrieve.outputs.filename) }}
          body: |
            **📽️ YouTube Download**

            **Title:** ${{ steps.retrieve.outputs.title }}
            **Original Link:** ${{ github.event.inputs.video_url }}
            **Quality:** ${{ github.event.inputs.desired_quality }}
            **Format:** ${{ github.event.inputs.output_format }}
            ${{ steps.retrieve.outputs.subtitle_saved == 'true' && '**🔤 Subtitles:** English subtitles are included as a .srt file.' || '' }}
            **Downloaded on:** ${{ steps.get_date.outputs.date }}

            ---
            Powered by Meli-Action ⚡
          files: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf release_files .download_info 2>/dev/null || true
